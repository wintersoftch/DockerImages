---
name: Run Renovate Bot
on:
  workflow_dispatch:
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "42 3 * * 1" # Run Renovate every Monday morning
jobs:
  renovate-bot:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420  # v46.1.7
        env:
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate-bot@users.noreply.github.com>"
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          LOG_LEVEL: debug
